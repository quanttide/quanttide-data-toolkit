[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
authors = [
    {name = "QuantTide", email = "opensource@quanttide.com"},
]
license = {text = "Apache 2.0"}
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.4.2",
    "logdecorator>=2.4",
    "requests>=2.31.0",
    "beautifulsoup4>=4.12.2",
]
name = "quanttide-data"
version = "0.1.0"
description = "量潮数据工程Python工具箱"
readme = "README.md"
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
]

[dependency-groups]
dev = [
    "pytest>=7.3.1",
    "coverage>=7.2.6",
]

[tool.hatch.build.targets.wheel]
packages = ["src/quanttide_data"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]


